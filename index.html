<!DOCTYPE html>
<html>
<head>
    <title>Sara's Portfolio</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#1e1e2f,#3a0ca3);
            color:white;
            text-align:center;
        }

        .container{
            padding:80px 20px;
        }

        .profile{
            width:150px;
            height:150px;
            border-radius:50%;
            background:white;
            margin:auto;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:60px;
            color:#3a0ca3;
            font-weight:bold;
        }

        h1{
            margin-top:20px;
            font-size:40px;
        }

        p{
            margin-top:10px;
            color:#ddd;
            font-size:18px;
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 25px;
            background:#ff4d6d;
            color:white;
            text-decoration:none;
            border-radius:30px;
        }

        .skills{
            margin-top:50px;
        }

        .card{
            background:rgba(255,255,255,0.1);
            width:250px;
            margin:15px auto;
            padding:20px;
            border-radius:20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile">S</div>

    <h1>Sara Singh</h1>
    <p>Web Developer • Coder • Writer</p>

    <a href="#" class="btn">Contact Me</a>

    <div class="skills">
        <div class="card">
            <h2>HTML & CSS</h2>
            <p>Beautiful website development.</p>
        </div>

        <div class="card">
            <h2>JavaScript</h2>
            <p>Interactive web applications.</p>
        </div>

        <div class="card">
            <h2>Writing</h2>
            <p>Fantasy and mystery novels.</p>
        </div>
    </div>
</div>

</body>
</html>
